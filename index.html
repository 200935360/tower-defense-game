<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔防游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        #gameCanvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            background: #2d5016;
        }

        .sidebar {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            width: 280px;
        }

        .stats {
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px;
        }

        .stat-label {
            font-weight: bold;
            color: #333;
        }

        .stat-value {
            color: #2a5298;
            font-weight: bold;
        }

        .tower-selection {
            margin-bottom: 20px;
        }

        .tower-selection h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .tower-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .tower-btn:hover {
            border-color: #2a5298;
            background: #f0f8ff;
        }

        .tower-btn.selected {
            border-color: #2a5298;
            background: #2a5298;
            color: white;
        }

        .tower-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tower-name {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .tower-info {
            font-size: 12px;
            color: #666;
        }

        .tower-btn.selected .tower-info {
            color: #ccc;
        }

        .game-controls {
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #28a745;
            color: white;
        }

        .btn-primary:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
        }

        .instructions h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .wave-info {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .enemy-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }

        .enemy-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>🛡️ 塔防游戏</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="sidebar">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">💰 金币:</span>
                    <span class="stat-value" id="gold">150</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">❤️ 生命:</span>
                    <span class="stat-value" id="lives">20</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🌊 波次:</span>
                    <span class="stat-value" id="wave">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">👹 敌人:</span>
                    <span class="stat-value" id="enemies">0</span>
                </div>
            </div>

            <div class="wave-info" id="waveInfo">
                <strong>准备阶段</strong><br>
                点击"开始波次"开始游戏<br>
                <div class="enemy-preview">
                    <div class="enemy-icon" style="background: #8B4513;"></div>
                    第一波: 狼人
                </div>
            </div>

            <div class="tower-selection">
                <h3>选择防御塔</h3>
                <button class="tower-btn" data-tower="ice">
                    <span class="tower-name">❄️ 冰塔</span>
                    <span class="tower-info">费用: 80 | 减速效果</span>
                </button>
                <button class="tower-btn" data-tower="fire">
                    <span class="tower-name">🔥 火塔</span>
                    <span class="tower-info">费用: 120 | 溅射伤害</span>
                </button>
                <button class="tower-btn" data-tower="lightning">
                    <span class="tower-name">⚡ 雷塔</span>
                    <span class="tower-info">费用: 150 | 连锁攻击</span>
                </button>
                <button class="tower-btn" data-tower="poison">
                    <span class="tower-name">☠️ 毒塔</span>
                    <span class="tower-info">费用: 100 | 持续伤害</span>
                </button>
            </div>

            <div class="game-controls">
                <button class="btn btn-primary" id="startWave">开始波次</button>
                <button class="btn btn-secondary" id="pauseGame">暂停游戏</button>
                <button class="btn btn-danger" id="resetGame">重新开始</button>
            </div>

            <div class="instructions">
                <h4>游戏说明</h4>
                <p>1. 选择防御塔类型<br>
                2. 点击地图空地放置<br>
                3. 阻止敌人到达终点<br>
                4. 击败敌人获得金币<br>
                5. 合理搭配塔的类型<br><br>
                <strong>怪物类型:</strong><br>
                🔺 狼人(第1波) | 💎 蝙蝠(第2波)<br>
                ⚫ 哥布林 | ⬜ 骷髅 | 🔺 兽人<br>
                💎 恶魔 | ⚫ 巨龙 | 💎 幽灵<br>
                ⬜ 吸血鬼 | ⚫ 魔王(第10波)</p>
            </div>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2 id="gameOverTitle">游戏结束</h2>
            <p id="gameOverText">你坚持了 5 波！</p>
            <button class="btn btn-primary" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
